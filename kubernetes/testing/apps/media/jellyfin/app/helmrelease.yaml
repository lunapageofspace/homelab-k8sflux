---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: jellyfin
spec:
  chartRef:
    kind: OCIRepository
    name: jellyfin
  interval: 1h
  values:
    controllers:
      jellyfin:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/jellyfin/jellyfin
              tag: 10.11.11@sha256:45f648c382a0c8b552582fcea40e95cb17c5d475473a891cba0eb7523fb92112
            probes:
              liveness:
                enabled: true
              readiness:
                enabled: true
            #resources:
            #  limits:
            #    cpu: 6
            #    memory: 5Gi
            #  requests:
            #    cpu: 500m
            #    memory: 2400Mi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        ports:
          http:
            port: 8096
    route:
      app:
        hostnames:
          - "{{ .Release.Name }}.zynthovian.xyz"
        parentRefs:
          - name: envoy-internal
            namespace: network
    persistence:
      media:
        type: nfs
        server: xenia.zynthovian.xyz
        path: /srv/media/Series
        globalMounts:
          - path: /media
            readOnly: true
      dri:
        hostPath: /dev/dri
        type: hostPath
      cache:
        type: emptyDir