---
# yaml-language-server: $schema=https://json.schemastore.org/helmfile

# Bootstraps core applications that provide a minimal runtime base for the
# cluster. These releases are installed first so the cluster has the resources
# Flux needs before its own reconciliation begins.
#
# After this bootstrap phase, Flux is ready to take over management of the
# application stack and continue reconciling downstream state.

bases:
  - defaults.yaml

helmDefaults:
  cleanupOnFail: true
  forceConflicts: true
  wait: true
  waitForJobs: true

releases:
  - name: cilium
    namespace: kube-system
    inherit:
      - template: default
    hooks:
      - # Wait for CRDs to be available
        command: kubectl
        args:
          - wait
          - --for=create
          - crd/ciliumbgpadvertisements.cilium.io
          - crd/ciliumbgpclusterconfigs.cilium.io
          - crd/ciliumbgppeerconfigs.cilium.io
          - crd/ciliumloadbalancerippools.cilium.io
          - --timeout=2m
        events:
          - postsync
        showlogs: true
      - # Apply Resources
        command: kubectl
        args:
          - apply
          - --namespace={{ .Release.Namespace }}
          - --server-side
          - --force-conflicts
          - --filename=../../apps/{{ .Release.Namespace }}/{{ .Release.Name }}/app/networking.yaml
        events:
          - postsync
        showlogs: true

  - name: coredns
    namespace: kube-system
    inherit:
      - template: default
    needs:
      - kube-system/cilium

  - name: external-secrets
    namespace: external-secrets
    inherit:
      - template: default
    takeOwnership: true
    hooks:
      - # Wait for CRDs to be available
        command: kubectl
        args:
          - wait
          - --for=create
          - crd/clustersecretstores.external-secrets.io
          - --timeout=2m
        events:
          - postsync
        showlogs: true
      - # Apply Resources
        command: kubectl
        args:
          - apply
          - --server-side
          - --force-conflicts
          - --namespace={{ .Release.Namespace }}
          - --kustomize
          - ../../apps/{{ .Release.Namespace }}/{{ .Release.Name }}/stores
        events:
          - postsync
        showlogs: true

  - name: cert-manager
    namespace: cert-manager
    inherit:
      - template: default

  - name: operator
    namespace: flux-system
    inherit:
      - template: default

  - name: instance
    namespace: flux-system
    inherit:
      - template: default
    hooks:
      - # Wait for CRDs to be available
        command: kubectl
        args:
          - wait
          - --for=create
          - crd/kustomizations.kustomize.toolkit.fluxcd.io
          - --timeout=2m
        events:
          - postsync
        showlogs: true
      - # Apply Resources
        command: kubectl
        args:
          - apply
          - --namespace={{ .Release.Namespace }}
          - --server-side
          - --force-conflicts
          - --kustomize
          - ../../apps/{{ .Release.Namespace }}/{{ .Release.Name }}/roots
        events:
          - postsync
        showlogs: true
    needs:
      - flux-system/operator