system {
    name {
        host-name N1-CGA0-SPINE
    }
}
interface ethernet-1/1 {
    admin-state enable
    subinterface 0 {
        admin-state enable
        ipv4 {
            address 192.168.0.0/31 {
            }
        }
    }
}
interface ethernet-1/2 {
    admin-state enable
    subinterface 0 {
        admin-state enable
        ipv4 {
            address 192.168.0.2/31 {
            }
        }
    }
}
interface system0 {
    admin-state enable
    subinterface 0 {
        admin-state enable
        ipv4 {
            address 172.20.1.1/32 {
            }
        }
    }
}
network-instance default {
    interface ethernet-1/1.0 {
    }
    interface ethernet-1/2.0 {
    }
    interface system0.0 {
    }
    protocols {
        isis {
            instance ISISUnderlay {
                admin-state enable
                level-capability L2
                net [ 49.0001.0000.0000.0001.00 ]
                ipv4-unicast {
                    admin-state enable
                }
                interface system0.0 {
                    admin-state enable
                    passive true
                    ipv4-unicast {
                        admin-state enable
                    }
                    level 2 {
                    }
                }
                interface ethernet-1/1.0 {
                    circuit-type point-to-point
                    ipv4-unicast {
                        admin-state enable
                    }
                    level 2 {
                    }
                }
                interface ethernet-1/2.0 {
                    circuit-type point-to-point
                    ipv4-unicast {
                        admin-state enable
                    }
                    level 2 {
                    }
                }
            }
        }
    }
}
routing-policy {
    policy all {
        default-action {
            accept {
            }
        }
    }
}
